name: repository-gates

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  static-gates:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate catalog, tests, scripts, Compose, and portability
        run: ./scripts/release-check.sh
